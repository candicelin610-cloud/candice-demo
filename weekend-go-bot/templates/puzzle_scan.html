<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掃碼解鎖 — Weekend GO！</title>
  <!-- html5-qrcode：純 JS QR 掃碼，支援手機相機 -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #FFFDE7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    h1 { font-size: 1.4rem; color: #5D4037; margin-bottom: 6px; }
    p.hint { font-size: 0.88rem; color: #8D6E63; margin-bottom: 20px; text-align: center; }

    #reader {
      width: 100%;
      max-width: 340px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }

    #result {
      margin-top: 20px;
      width: 100%;
      max-width: 340px;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      font-size: 0.95rem;
      display: none;
    }
    #result.success { background: #FBC02D; color: #5D4037; }
    #result.already { background: #FFE082; color: #795548; }
    #result.error   { background: #FFCDD2; color: #B71C1C; }

    #result .big { font-size: 2rem; margin-bottom: 6px; }
    #result .msg { font-weight: 700; margin-bottom: 4px; }
    #result .sub { font-size: 0.8rem; }

    .back-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: #5D4037;
      color: #FFF9C4;
      border-radius: 10px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>

<h1>📷 掃碼解鎖碎片</h1>
<p class="hint">將鏡頭對準景點 QR Code，自動辨識並解鎖拼圖碎片</p>

<div id="reader"></div>
<div id="result"></div>

<a class="back-btn" href="/puzzle?uid={{ user_id }}">← 返回拼圖進度</a>

<script>
  const USER_ID = "{{ user_id }}";
  let scanning = true;

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },      // 優先使用後鏡頭
    { fps: 10, qrbox: { width: 220, height: 220 } },
    onScanSuccess,
    () => {}                            // 忽略掃描中的錯誤提示
  ).catch(err => showResult("error", "❌", "無法開啟相機", err.toString()));

  async function onScanSuccess(decodedText) {
    if (!scanning) return;
    scanning = false;                   // 避免重複送出

    // QR Code 格式期望：piece_id=<數字>（例如 piece_id=3）
    const match = decodedText.match(/piece_id=(\w+)/);
    const pieceId = match ? match[1] : decodedText.trim();

    try {
      const res = await fetch("/api/puzzle/checkin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: USER_ID, piece_id: pieceId }),
      });
      const data = await res.json();

      if (!data.ok) {
        showResult("error", "❌", "這個 QR Code 無效", data.error || "");
        resumeScan();
      } else if (data.already_had) {
        showResult("already", "🔄", "你已經收集過這片囉！",
          `目前進度：${data.count} / ${data.total} 片`);
        resumeScan();
      } else {
        html5QrCode.stop();
        showResult("success", "🧩", "解鎖成功！",
          `目前進度：${data.count} / ${data.total} 片`);
      }
    } catch (e) {
      showResult("error", "❌", "網路錯誤，請稍後再試", e.toString());
      resumeScan();
    }
  }

  function showResult(type, icon, msg, sub) {
    const el = document.getElementById("result");
    el.className = `result ${type}`;
    el.style.display = "block";
    el.innerHTML = `<div class="big">${icon}</div><div class="msg">${msg}</div><div class="sub">${sub}</div>`;
  }

  function resumeScan() {
    setTimeout(() => {
      document.getElementById("result").style.display = "none";
      scanning = true;
    }, 2500);
  }
</script>

</body>
</html>
